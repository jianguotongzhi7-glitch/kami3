<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your sin, I bear">
    <title>God is Madoka - 鹿目圆香 魔法少女まどか☆マギカ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Header -->
    <header id="header">
        <div class="container">
            <div class="logo">
                <a href="#" class="logo-link">
                    <div class="logo-circle"></div>
                </a>
            </div>
        </div>
    </header>

    <!-- Background Music -->
    <audio id="bgMusic1">
        <source src="./music/1.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgMusic2">
        <source src="./music/2.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgMusic3">
        <source src="./music/3.mp3" type="audio/mpeg">
    </audio>

    <!-- Swiper -->
    <div class="swiper">
        <div class="swiper-wrapper">
            <!-- Slide 1 -->
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('./images/bg1.jpg')"></div>
                <div class="slide-content">
                    <div class="text-container">
                        <h3>Darkness cannot drive out darkness</h3>
                        <h3>only light can do that</h3>
                        <h3>Hate cannot drive out hate</h3>
                        <h3>only love can do that.</h3>
                        <p class="quote">Your sin, I bear</p>
                    </div>
                    <!-- Music Player -->
                    <div class="music-player">
                        <div class="player-container">
                            <button class="play-btn" data-audio="bgMusic1">
                                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                                </svg>
                            </button>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Navigation -->
                    <div class="slide-navigation">
                        <div class="pagination-dots"></div>
                    </div>
                </div>
            </div>
            <!-- Slide 2 -->
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('./images/bg2.jpg')"></div>
                <div class="slide-content">
                    <div class="text-container">
                        <h3>如果有人告诉我</h3>
                        <h3>怀有希望是一件错误的事情</h3>
                        <h3>我将无论多少次都会出言反驳</h3>
                        <h3>不管何时我都能这样坚持。</h3>
                        <p class="quote">你的罪孽，我来背负</p>
                    </div>
                    <!-- Music Player -->
                    <div class="music-player">
                        <div class="player-container">
                            <button class="play-btn" data-audio="bgMusic2">
                                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                                </svg>
                            </button>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Navigation -->
                    <div class="slide-navigation">
                        <div class="pagination-dots"></div>
                    </div>
                </div>
            </div>
            <!-- Slide 3 -->
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('./images/bg3.jpg')"></div>
                <div class="slide-content">
                    <div class="text-container">
                        <h3>无论多少次</h3>
                        <h3>我都会选择希望</h3>
                        <h3>无论多么绝望</h3>
                        <h3>我都相信未来</h3>
                        <p class="quote">奇迹与魔法，都是存在的</p>
                    </div>
                    <!-- Music Player -->
                    <div class="music-player">
                        <div class="player-container">
                            <button class="play-btn" data-audio="bgMusic3">
                                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                                </svg>
                            </button>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Navigation -->
                    <div class="slide-navigation">
                        <div class="pagination-dots"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="script_fixed.js"></script>
</body>
</html>
